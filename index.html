<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Texto em Lote</title>
  <style>
    [data-theme="dark"] {
      --bg: #0a0b0f;
      --bg-surface: #14151b;
      --bg-panel: #1a1b23;
      --bg-input: #22232e;
      --bg-hover: #2a2b38;
      --border: #33343f;
      --text: #e6e8ef;
      --text-muted: #7a7c8b;
      --accent: #6c5ce7;
      --accent-hover: #5a4bd6;
      --accent-glow: rgba(108, 92, 231, 0.15);
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #e17055;
      --preview-bg: rgba(0, 184, 148, 0.08);
      --preview-border: rgba(0, 184, 148, 0.2);
      --shadow: 0 8px 24px rgba(0,0,0,0.4);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
    }
    [data-theme="light"] {
      --bg: #f4f5f7;
      --bg-surface: #ffffff;
      --bg-panel: #ffffff;
      --bg-input: #f0f1f5;
      --bg-hover: #e8e9ef;
      --border: #dcdfe5;
      --text: #1a1b2e;
      --text-muted: #8a8c9b;
      --accent: #6c5ce7;
      --accent-hover: #5a4bd6;
      --accent-glow: rgba(108, 92, 231, 0.1);
      --success: #00b894;
      --warning: #e67e22;
      --danger: #e74c3c;
      --preview-bg: rgba(0, 184, 148, 0.06);
      --preview-border: rgba(0, 184, 148, 0.25);
      --shadow: 0 8px 24px rgba(0,0,0,0.06);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .app { max-width: 1440px; margin: 0 auto; padding: 1.25rem; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-icon { width: 32px; height: 32px; }
    header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.03em; }
    header .version { font-size: 0.75rem; color: var(--text-muted); background: var(--bg-input); padding: 0.2rem 0.6rem; border-radius: 12px; }
    
    .header-actions { display: flex; gap: 0.5rem; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; color: var(--text-muted);
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--accent); }
    .icon-btn svg { width: 18px; height: 18px; }

    .main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 1.5rem; flex: 1; min-height: 0; }
    @media (max-width: 950px) { .main-grid { grid-template-columns: 1fr; grid-template-rows: auto auto; } }

    /* Editor */
    .editor-panel {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;
      position: sticky; top: 1.25rem; height: calc(100vh - 140px);
    }
    @media (max-width: 950px) { .editor-panel { position: static; height: auto; min-height: 450px; } }

    .toolbar { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tool-btn {
      background: var(--bg-input); color: var(--text); border: 1px solid var(--border);
      padding: 0.45rem 0.7rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
      display: flex; align-items: center; gap: 0.4rem; transition: all 0.2s ease;
    }
    .tool-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tool-btn svg { width: 14px; height: 14px; }
    .tool-btn.danger { color: var(--danger); border-color: rgba(225,112,85,0.3); }
    .tool-btn.danger:hover { background: rgba(225,112,85,0.1); }

    #editor {
      flex: 1; width: 100%; background: var(--bg-input); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.85rem; resize: none; line-height: 1.6; min-height: 200px;
      transition: border-color 0.2s;
    }
    #editor:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .status-bar { font-size: 0.78rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; padding-top: 0.25rem; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .status-dot.processing { background: var(--warning); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Tools Panel */
    .tools-panel {
      display: flex; flex-direction: column; gap: 1rem;
      overflow-y: auto; padding-right: 0.25rem;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .tools-panel::-webkit-scrollbar { width: 5px; }
    .tools-panel::-webkit-scrollbar-track { background: transparent; }
    .tools-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .card {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 1rem;
      box-shadow: var(--shadow-sm); transition: background 0.3s ease, border-color 0.3s ease;
    }
    .card-header {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem;
      font-size: 0.9rem; font-weight: 600; color: var(--text);
    }
    .card-header svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }

    .field { margin-bottom: 0.7rem; }
    .field label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .field input, .field select {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); padding: 0.5rem 0.6rem; border-radius: 8px; font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .row { display: flex; gap: 0.5rem; }
    .row > * { flex: 1; }

    /* Mode Toggle */
    .mode-toggle {
      display: flex; background: var(--bg-input); border-radius: 8px; padding: 3px; margin-bottom: 0.75rem;
      border: 1px solid var(--border);
    }
    .mode-opt {
      flex: 1; padding: 0.4rem 0.2rem; text-align: center; border-radius: 6px; cursor: pointer;
      font-size: 0.75rem; font-weight: 500; color: var(--text-muted); transition: all 0.2s ease;
      user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mode-opt.active { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }

    /* Preset Buttons */
    .presets { display: flex; gap: 0.4rem; margin-bottom: 0.7rem; }
    .preset-btn {
      flex: 1; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted);
      padding: 0.35rem; border-radius: 6px; cursor: pointer; font-size: 0.72rem; font-weight: 500;
      transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.3rem;
    }
    .preset-btn:hover { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }
    .preset-btn svg { width: 12px; height: 12px; }

    .checkbox { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; margin: 0.5rem 0; }
    .checkbox input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

    /* Preview */
    .preview {
      margin-top: 0.6rem; padding: 0.55rem 0.7rem; background: var(--preview-bg);
      border: 1px solid var(--preview-border); border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.8rem;
      color: var(--success); word-break: break-all; min-height: 2.2rem;
      transition: all 0.3s ease;
    }
    .preview-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.15rem; display: block; }
    .preview.empty { color: var(--text-muted); font-style: italic; }

    .apply-btn {
      width: 100%; background: var(--accent); color: #fff; border: none; padding: 0.6rem;
      border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
      margin-top: 0.5rem; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .apply-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3); }
    .apply-btn:active { transform: translateY(0); }
    .apply-btn svg { width: 16px; height: 16px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--bg-surface);
      border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem;
      border-radius: 10px; box-shadow: var(--shadow); transform: translateY(12px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9999; font-size: 0.82rem;
      max-width: 320px; backdrop-filter: blur(8px);
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid var(--success); }
    #toast.error { border-left: 3px solid var(--danger); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.85 2.85 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
          <path d="m15 5 4 4"/>
        </svg>
        <h1>Editor de Texto</h1>
        <span class="version">v2.2</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" aria-label="Alternar tema">
          <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="moonIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main-grid">
      <section class="editor-panel">
        <div class="toolbar">
          <button class="tool-btn" id="btn-undo" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
            Desfazer
          </button>
          <button class="tool-btn" id="btn-restore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Original
          </button>
          <button class="tool-btn" id="btn-copy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="14" height="14" rx="2"/><path d="M4 16V6a2 2 0 0 1 2-2h12"/></svg>
            Copiar
          </button>
          <button class="tool-btn" id="btn-download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            Baixar
          </button>
          <button class="tool-btn danger" id="btn-clear" style="margin-left: auto;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>
        <textarea id="editor" placeholder="Cole ou digite seu texto aqui...&#10;Cada linha será processada individualmente."></textarea>
        <div class="status-bar">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Pronto. Cole ou digite um texto para começar.</span>
        </div>
      </section>

      <section class="tools-panel">
        
        <div class="card">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
            Localizar & Substituir
          </div>
          <div class="field"><label>Localizar</label><input type="text" id="find-text" placeholder="Texto atual..."></div>
          <div class="field"><label>Substituir por</label><input type="text" id="replace-text" placeholder="Novo texto..."></div>
          <label class="checkbox"><input type="checkbox" id="find-case"> Diferenciar maiúsculas/minúsculas</label>
          <button class="apply-btn" id="btn-find-replace">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
            Aplicar
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
            Transformar Texto
          </div>
          
          <div class="mode-toggle">
            <div class="mode-opt active" data-mode="insert">Inserir</div>
            <div class="mode-opt" data-mode="delete">Excluir Qtd</div>
            <div class="mode-opt" data-mode="truncate">Excluir por Texto</div>
          </div>

          <div id="tf-pos-container">
            <div class="row" style="margin-bottom: 0.5rem;">
              <div class="field" style="margin-bottom:0"><label>Posição</label><input type="number" id="tf-pos" value="0" min="0"></div>
              <div class="field" style="margin-bottom:0"><label>Direção</label>
                <select id="tf-dir"><option value="end">Do final</option><option value="start" selected>Do início</option></select>
              </div>
            </div>
            <div class="presets">
              <button class="preset-btn" data-preset="start0">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 17l5-5-5"/><path d="M6 17l5-5-5"/></svg>
                Modo Início
              </button>
              <button class="preset-btn" data-preset="end0">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 7 10 10"/><path d="m7 17 10-10"/></svg>
                Modo Final
              </button>
            </div>
          </div>

          <div id="tf-insert-field" class="field"><label>Texto a Inserir</label><input type="text" id="tf-insert-text" placeholder="Ex: 0, -, prefixo..."></div>
          <div id="tf-delete-field" class="field hidden"><label>Qtd. Caracteres</label><input type="number" id="tf-del-count" value="1" min="0"></div>
          
          <div id="tf-truncate-field" class="hidden">
            <div class="field">
              <label>Marcador Base (Referência)</label>
              <input type="text" id="tf-trunc-mark" placeholder="Ex: xxx">
            </div>
            <div class="field">
              <label>Ação a realizar</label>
              <select id="tf-trunc-action">
                <option value="del_exact_before" selected>Excluir texto exato ANTES do marcador</option>
                <option value="del_exact_after">Excluir texto exato DEPOIS do marcador</option>
                <option value="del_all_before">Excluir TUDO que vem antes do marcador</option>
                <option value="del_all_after">Excluir TUDO que vem depois do marcador</option>
              </select>
            </div>
            <div class="field" id="tf-trunc-exact-box">
              <label>Texto exato a excluir</label>
              <input type="text" id="tf-trunc-exact" placeholder="Ex: min">
            </div>
            <label class="checkbox"><input type="checkbox" id="tf-trunc-incl"> Excluir também o marcador</label>
          </div>

          <label class="checkbox"><input type="checkbox" id="tf-ignore-empty" checked> Ignorar linhas vazias</label>

          <div class="preview" id="tf-preview-box">
            <span class="preview-label">Prévia (1ª linha):</span>
            <span id="tf-preview" class="empty">Aguardando texto ou alterações...</span>
          </div>

          <button class="apply-btn" id="btn-transform">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/></svg>
            Aplicar Transformação
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 12h1v4"/><path d="M4 18h1v4"/></svg>
            Enumerador de Linhas
          </div>
          <div class="row" style="margin-bottom:0.5rem;">
            <div class="field" style="margin-bottom:0"><label>Iniciar em</label><input type="number" id="enum-start" value="1" min="1"></div>
            <div class="field" style="margin-bottom:0"><label>Dígitos (casas)</label><input type="number" id="enum-digits" value="2" min="1" max="10"></div>
          </div>
          <div class="field"><label>Separador</label><input type="text" id="enum-sep" value=" - " placeholder="Ex: .  ou ) "></div>
          <label class="checkbox"><input type="checkbox" id="enum-ignore" checked> Ignorar linhas vazias</label>
          <button class="apply-btn" id="btn-enumerate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Z"/><path d="m13 8 2-2 2 2"/><path d="M15 6v10"/></svg>
            Numerar Linhas
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            Excluir Linhas por Texto
          </div>
          <div class="field"><label>Texto para buscar</label><input type="text" id="exclude-text" placeholder="Ex: erro, null, @..."></div>
          <label class="checkbox"><input type="checkbox" id="exclude-case"> Diferenciar maiúsculas/minúsculas</label>
          <label class="checkbox"><input type="checkbox" id="exclude-invert"> Excluir linhas que <b>NÃO</b> contêm (Manter correspondências)</label>
          <button class="apply-btn" id="btn-exclude-lines">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            Excluir Linhas
          </button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast"></div>

  <script>
    // State
    const state = { original: '', current: '', history: [], maxHistory: 20 };
    const els = {
      editor: document.getElementById('editor'), statusText: document.getElementById('status-text'),
      statusDot: document.getElementById('status-dot'), toast: document.getElementById('toast'),
      btnUndo: document.getElementById('btn-undo')
    };

    // Utils
    const escapeRegex = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const showToast = (msg, type='success') => { els.toast.textContent = msg; els.toast.className = `show ${type}`; setTimeout(()=>els.toast.className='', 3500); };
    const setStatus = (msg, busy=false) => { els.statusText.textContent = msg; els.statusDot.className = `status-dot${busy?' processing':''}`; };
    const getFirstLine = () => els.editor.value.split('\n')[0]?.replace(/\r$/,'') || '';

    // Theme
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    updateThemeIcons(savedTheme);

    themeBtn.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcons(next);
    });
    function updateThemeIcons(theme) {
      if (theme === 'dark') { sunIcon.classList.remove('hidden'); moonIcon.classList.add('hidden'); }
      else { moonIcon.classList.remove('hidden'); sunIcon.classList.add('hidden'); }
    }

    // History & Editor
    const saveHistory = () => { state.history.push(state.current); if(state.history.length>state.maxHistory) state.history.shift(); els.btnUndo.disabled=false; };
    const updateEditor = text => { state.current=text; els.editor.value=text; setStatus(`${text.split('\n').length} linhas no texto.`); updatePreview(); };
    const processText = fn => {
      const input = els.editor.value;
      if(!input) return showToast('Nenhum texto para processar.', 'error');
      if(input.length > 500000) showToast('Texto grande. Processando...', 'success');
      setStatus('Processando...', true);
      setTimeout(()=>{
        saveHistory(); let changed=0;
        const res = input.split('\n').map(line => { const b=line; const a=fn(line); if(b!==a)changed++; return a; });
        updateEditor(res.join('\n'));
        setStatus(`✅ ${changed} linha(s) modificada(s).`); showToast(`${changed} linha(s) alterada(s).`);
      }, 10);
    };

    // Mode Toggle
    const modeOpts = document.querySelectorAll('.mode-opt');
    let currentMode = 'insert';
    modeOpts.forEach(opt => {
      opt.addEventListener('click', () => {
        currentMode = opt.dataset.mode;
        modeOpts.forEach(o=>o.classList.remove('active'));
        opt.classList.add('active');
        
        const isPosMode = currentMode === 'insert' || currentMode === 'delete';
        document.getElementById('tf-pos-container').classList.toggle('hidden', !isPosMode);
        document.getElementById('tf-insert-field').classList.toggle('hidden', currentMode !== 'insert');
        document.getElementById('tf-delete-field').classList.toggle('hidden', currentMode !== 'delete');
        document.getElementById('tf-truncate-field').classList.toggle('hidden', currentMode !== 'truncate');
        
        updatePreview();
      });
    });

    // Toggle para a caixa de "Texto exato" dentro de Truncate
    document.getElementById('tf-trunc-action').addEventListener('change', (e) => {
      const isExact = e.target.value.includes('exact');
      document.getElementById('tf-trunc-exact-box').classList.toggle('hidden', !isExact);
    });

    // Presets
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const preset = btn.dataset.preset;
        const dirEl = document.getElementById('tf-dir');
        const posEl = document.getElementById('tf-pos');
        if(preset==='start0') { dirEl.value='start'; posEl.value=0; }
        else { dirEl.value='end'; posEl.value=0; }
        updatePreview();
      });
    });

    // Função central que aplica a lógica de Transformar Texto
    const transformLineLogic = (line) => {
      if(currentMode==='insert') {
        const text = document.getElementById('tf-insert-text').value;
        if(!text) return line;
        const pos = Math.max(0, parseInt(document.getElementById('tf-pos').value)||0);
        const dir = document.getElementById('tf-dir').value;
        const len = line.length;
        const idx = dir==='start' ? Math.min(pos, len) : Math.min(Math.max(0, len-pos), len);
        return `${line.slice(0,idx)}${text}${line.slice(idx)}`;
      } 
      else if(currentMode==='delete') {
        const count = Math.max(0, parseInt(document.getElementById('tf-del-count').value)||0);
        if(count===0) return line;
        const dir = document.getElementById('tf-dir').value;
        const safe = Math.min(count, line.length);
        return dir==='start' ? line.slice(safe) : line.slice(0, -safe || undefined);
      } 
      else if(currentMode==='truncate') {
        const mark = document.getElementById('tf-trunc-mark').value;
        if(!mark) return line;
        const action = document.getElementById('tf-trunc-action').value;
        const incl = document.getElementById('tf-trunc-incl').checked;
        const exact = document.getElementById('tf-trunc-exact').value;

        const idx = line.indexOf(mark);
        if(idx === -1) return line;

        if(action === 'del_all_before') {
          return incl ? line.slice(idx + mark.length) : line.slice(idx);
        } else if(action === 'del_all_after') {
          return incl ? line.slice(0, idx) : line.slice(0, idx + mark.length);
        } else if(action === 'del_exact_before') {
          if(!exact) return line;
          const regex = new RegExp(escapeRegex(exact) + escapeRegex(mark), 'g');
          return line.replace(regex, incl ? '' : mark);
        } else if(action === 'del_exact_after') {
          if(!exact) return line;
          const regex = new RegExp(escapeRegex(mark) + escapeRegex(exact), 'g');
          return line.replace(regex, incl ? '' : mark);
        }
      }
      return line;
    };

    // Preview Logic
    const updatePreview = () => {
      const line = getFirstLine();
      const prev = document.getElementById('tf-preview');
      if(!line) return (prev.textContent='(Nenhum texto)', prev.className='empty');
      const ignore = document.getElementById('tf-ignore-empty').checked;
      if(ignore && line.trim()==='') return (prev.textContent='(Linha vazia ignorada)', prev.className='empty');
      
      const result = transformLineLogic(line);
      prev.textContent = result;
      prev.className = '';
    };

    // Preview Listeners
    const transformInputs = [
      'tf-pos', 'tf-dir', 'tf-insert-text', 'tf-del-count', 'tf-ignore-empty', 
      'tf-trunc-mark', 'tf-trunc-action', 'tf-trunc-exact', 'tf-trunc-incl'
    ];
    transformInputs.forEach(id => {
      const el = document.getElementById(id);
      if(el) { el.addEventListener('input', updatePreview); el.addEventListener('change', updatePreview); }
    });

    els.editor.addEventListener('input', () => {
      state.current = els.editor.value;
      if(!state.original && state.current) state.original = state.current;
      setStatus(`${state.current.split('\n').length} linhas.`); updatePreview();
    });

    // Transform Action
    document.getElementById('btn-transform').addEventListener('click', () => {
      const ignore = document.getElementById('tf-ignore-empty').checked;
      processText(line => {
        if(ignore && line.trim()==='') return line;
        return transformLineLogic(line);
      });
    });

    // Find & Replace
    document.getElementById('btn-find-replace').addEventListener('click', () => {
      const f = document.getElementById('find-text').value;
      const r = document.getElementById('replace-text').value;
      if(!f) return showToast('Preencha "Localizar".','error');
      const cs = document.getElementById('find-case').checked;
      processText(line => cs ? line.replaceAll(f,r) : line.replace(new RegExp(escapeRegex(f),'gi'),r));
    });

    // Enumerate
    document.getElementById('btn-enumerate').addEventListener('click', () => {
      let start = parseInt(document.getElementById('enum-start').value)||1;
      const dig = Math.min(10, Math.max(1, parseInt(document.getElementById('enum-digits').value)||2));
      const sep = document.getElementById('enum-sep').value;
      const ign = document.getElementById('enum-ignore').checked;
      processText(line => { if(ign && line.trim()==='') return line; return `${String(start++).padStart(dig,'0')}${sep}${line}`; });
    });

    // Excluir Linhas por Texto
    document.getElementById('btn-exclude-lines').addEventListener('click', () => {
      const searchText = document.getElementById('exclude-text').value;
      if (!searchText) return showToast('Preencha o texto para buscar.', 'error');
      
      const caseSensitive = document.getElementById('exclude-case').checked;
      const inverterAcao = document.getElementById('exclude-invert').checked;
      const input = els.editor.value;
      if (!input) return showToast('Nenhum texto para processar.', 'error');
      
      setStatus('Processando...', true);
      
      setTimeout(() => {
        saveHistory();
        const linhas = input.split('\n');
        const filtradas = linhas.filter(linha => {
          const possuiTexto = caseSensitive
            ? linha.includes(searchText)
            : linha.toLowerCase().includes(searchText.toLowerCase());
          return inverterAcao ? possuiTexto : !possuiTexto;
        });
        
        const removidas = linhas.length - filtradas.length;
        updateEditor(filtradas.join('\n'));
        
        if (removidas === 0) {
          setStatus('ℹ️ Nenhuma linha correspondente encontrada.');
          showToast('Nenhuma linha foi afetada.', 'success');
        } else {
          setStatus(`✅ ${removidas} linha(s) removida(s).`);
          showToast(`${removidas} linha(s) excluída(s).`, 'success');
        }
      }, 10);
    });

    // Global Actions
    els.btnUndo.addEventListener('click', () => { if(!state.history.length) return; state.current=state.history.pop(); els.editor.value=state.current; els.btnUndo.disabled=!state.history.length; setStatus(`↩️ ${state.current.split('\n').length} linhas.`); showToast('Desfeito.'); });
    document.getElementById('btn-restore').addEventListener('click', () => { if(!state.original) return showToast('Nenhum original.','error'); saveHistory(); updateEditor(state.original); showToast('Original restaurado.'); });
    document.getElementById('btn-copy').addEventListener('click', async () => { try { await navigator.clipboard.writeText(els.editor.value); showToast('Copiado!'); } catch { showToast('Falha.','error'); } });
    document.getElementById('btn-download').addEventListener('click', () => { if(!els.editor.value) return showToast('Nada para baixar.','error'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([els.editor.value],{type:'text/plain'})); a.download='texto_editado.txt'; a.click(); showToast('Download iniciado.'); });
    document.getElementById('btn-clear').addEventListener('click', () => { if(!els.editor.value) return; saveHistory(); state.original=''; updateEditor(''); showToast('Limpo.'); });
    els.editor.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();els.btnUndo.click();}});

    // Init
    els.editor.focus(); updatePreview();
  </script>
</body>
</html>
